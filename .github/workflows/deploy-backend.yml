# Deploys the backend (database schema + edge functions) to Supabase from CI.
#
# Why: `supabase db push` needs a direct Postgres connection on port 5432, which
# many office/ISP networks block. GitHub's runners have open egress, so running
# it here sidesteps local network restrictions. Run it manually from the
# Actions tab (workflow_dispatch).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  – personal token from supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   – the project's database password
name: Deploy backend (Supabase)

on:
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: "Also deploy edge functions"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: wjsnnjfjtelfxswshwta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        if: ${{ inputs.deploy_functions }}
        run: supabase functions deploy
