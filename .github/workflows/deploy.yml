# Builds the Vite SPA and deploys it to Cloudflare Pages.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   – token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  – your Cloudflare account id
#
# The Supabase VITE_* values are read from the committed .env file (public anon
# keys, safe to ship in the bundle), so no build secrets are required.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Optionally point the build at a specific Supabase project via repository
      # Variables (Settings → Secrets and variables → Actions → Variables). When
      # set, they win over the committed .env; when unset, the committed .env is
      # used. We only write the override file when values exist, so empty
      # Variables can never blank out the committed defaults.
      - name: Configure Supabase env (optional override)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
        run: |
          if [ -n "$VITE_SUPABASE_URL" ]; then
            {
              echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL"
              echo "VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY"
              echo "VITE_SUPABASE_PROJECT_ID=$VITE_SUPABASE_PROJECT_ID"
            } > .env.production.local
            echo "Wrote .env.production.local override for $VITE_SUPABASE_PROJECT_ID"
          else
            echo "No VITE_SUPABASE_* Variables set; using committed .env"
          fi

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=coflow-crm --branch=${{ github.ref_name }}
