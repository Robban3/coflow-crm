# Builds the Vite SPA and deploys it to Cloudflare Pages.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   – token with the "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  – your Cloudflare account id
#
# The Supabase VITE_* values are read from the committed .env file (public anon
# keys, safe to ship in the bundle), so no build secrets are required.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Supabase VITE_* values are read from the committed .env file (they
      # are public anon keys, safe to ship in the bundle). No secrets needed
      # here — only the two Cloudflare secrets used by the deploy step below.
      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=coflow-crm --branch=${{ github.ref_name }}
